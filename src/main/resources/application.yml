server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/loandb?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true

  jackson:
    serialization:
      write-dates-as-timestamps: false
    date-format: yyyy-MM-dd HH:mm:ss

  servlet:
    multipart:
      enabled: true
      max-file-size: 5MB
      max-request-size: 10MB


app:
  jwt:
    secret: ${JWT_SECRET}
    expiration: 86400000

jasper:
  report-path: classpath:/reports/

logging:
  level:
    com.loanapp: DEBUG
    org.hibernate.SQL: DEBUG